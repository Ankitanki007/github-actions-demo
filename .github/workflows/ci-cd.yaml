name: Complete CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-demo
  PYTHON_VERSION: "3.12"
  PYTHONPATH: .

jobs:
  # ─── JOB 1: LINT ────────────────────────────────────────
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install flake8
      - name: Run flake8
        run: flake8 app/ tests/ --statistics

  # ─── JOB 2: TEST ────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]    # Only run if lint passes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=80 \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─── JOB 3: BUILD ───────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]    # Only build if tests pass
    if: github.ref == 'refs/heads/main'    # Only on main branch (not PRs)
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ github.run_number }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 4: SCAN ────────────────────────────────────────
  scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          format: 'table'

  # ─── JOB 5: DEPLOY ──────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [scan]       # Only deploy if security scan passes
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop my-app 2>/dev/null || true
            docker rm my-app 2>/dev/null || true
            docker run -d \
              --name my-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e APP_VERSION=build-${{ github.run_number }} \
              ${{ env.IMAGE_NAME }}:latest
            sleep 10
            curl -f http://localhost:5000/health
            docker image prune -f

      # Notify deployment success/failure
      - name: Notify success
        if: success()
        run: |
          echo "Deployment SUCCESS"
          echo "Version: build-${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "App: http://${{ secrets.EC2_HOST }}:5000"

      - name: Notify failure
        if: failure()
        run: echo "DEPLOYMENT FAILED for build ${{ github.run_number }}"
