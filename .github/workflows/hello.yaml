name: Hello World Workflow

on:
  push:
    branches: [main]    # Trigger on push to main
  workflow_dispatch:    # Also allow manual trigger from GitHub UI

jobs:
  say-hello:
    runs-on: ubuntu-latest    # Use GitHub's free Ubuntu runner
    steps:
      - name: Print hello
        run: echo "Hello from GitHub Actions!"

      - name: Print date and time
        run: date

      - name: Print OS info
        run: uname -a

      - name: Print working directory
        run: pwd

      - name: List files
        run: ls -la

      - name: Checkout my code
        uses: actions/checkout@v4    # This downloads your repo to the runner

      - name: List files after checkout
        run: ls -la    # Now you'll see your project files

      - name: Print Python version
        run: python3 --version